# All host-side ports use the project-wide +10 offset:
#   Postgres  5432 → 5442
#   Redis     6379 → 6389

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: guardrail
      POSTGRES_PASSWORD: guardrail
      POSTGRES_DB: guardrail
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guardrail"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres_data:
  redis_data:
